name: security

# Calls the shared reusable security workflow — the SSOT in thorvath-slower/ci-workflows (CZID-310).
# One definition for all repos; this repo only keeps its own .trivyignore baseline (CZID-264).
on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      run_checkov:
        description: "Also run the full Checkov policy pass (full-suite / prod check)"
        type: boolean
        default: false

jobs:
  security:
    uses: thorvath-slower/ci-workflows/.github/workflows/security.yml@v1
    with:
      run_checkov: ${{ inputs.run_checkov || false }}
