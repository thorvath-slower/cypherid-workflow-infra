name: OpenTofu Validate

# Calls the shared reusable OpenTofu fmt + validate gate — the SSOT in thorvath-slower/ci-workflows
# (CZID-310), paired with security.yml. The chalice lambda modules are codegen'd in `prepare` (after the
# fmt check, so generated files aren't format-gated); validate sources environment.test and clears the
# remote-backend args so it can init -backend=false. check_lockfile enforces the provider pin (CZID-30).
on:
  push:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  pull_request:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    uses: thorvath-slower/ci-workflows/.github/workflows/tofu-ci.yml@v1
    with:
      fmt_path: .
      prepare: |
        source ./environment.test
        make package-lambdas
      validate_command: |
        source ./environment.test
        unset TF_CLI_ARGS_init TF_CLI_ARGS_output
        tofu init -backend=false -input=false
        tofu validate
      check_lockfile: true
