name: idseq-web check

on:
  # CZID-204 — the Python flake8 lint is a no-AWS gate, so run it automatically on PRs (and on the
  # protected branches post-merge), matching validate.yml. Plan/deploy stay manual (they need AWS OIDC).
  push:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  pull_request:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  workflow_dispatch:

jobs:
  python:
    name: Check Python
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache Python Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          #pip-version:
          pip-install: -r requirements-dev.txt
      - name: Run flake8
        uses: julianwachholz/flake8-action@v2
        with:
          checkName: "Python Lint"
#          plugins: flake8-spellcheck
#      - name: Test # TODO: need to setup localstack
#        run: python3 -m unittest discover -v -s test/ -p 'test_*.py'
