name: CypherID Workflow Infra Deploy
run-name: Deploy CypherID Workflow Infra to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The environment to which to deploy'
        required: true
        type: string
        default: 'dev'

env:
  AWS_REGION : us-west-2
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
  # CZID-40 (CICD-6): drive the CI identity from repo/org Actions variables so it is rotatable and
  # not tied to a hardcoded account. Falls back to the current values if the vars are unset, so this
  # is safe to merge before the Actions variables are configured.
  CI_ACCOUNT_ID: ${{ vars.CI_ACCOUNT_ID || '941377154785' }}
  GHA_ROLE: ${{ vars.GHA_ROLE || 'gha-seqtoid' }}

permissions:
  id-token: write
  contents: read

jobs:
  DeployTerraform:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v6
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.CI_ACCOUNT_ID }}:role/${{ env.GHA_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
    #   - name: Install initial tools required by report_deployment_status.sh
    #     run: |
    #       sudo apt-get update
    #       sudo apt-get install jq
    #       sudo apt-get install -y httpie
    #   - name: Output GH Event Data
    #     run: |
    #       jq -r . "$GITHUB_EVENT_PATH"
      - name: Deploy dev
        run: |
          #trap 'scripts/report_deployment_status.sh failure' ERR
          #scripts/report_deployment_status.sh in_progress "Starting deployment"
          source scripts/init_ci_runner.sh
          make deploy