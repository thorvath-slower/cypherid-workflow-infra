name: Plan only
run-name: Plan only in env ${{ inputs.environment || github.base_ref || github.ref_name }} branch ${{ github.base_ref || github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  pull_request:
    branches:
      - development
      - staging
      - main
      - 'releases/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Both Github Environment and AWS Environment
        required: true
        type: environment
        default: dev

env:
  branch_name: ${{ github.base_ref || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}-${{ inputs.environment }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  should-plan:
    name: Check if OpenTofu Plan should be performed
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.calculate-environment.outputs.environment }}
    steps:
      - name: Calculate Environment
        id: calculate-environment
        # TODO: Handle Releases
        run: |
          echo "branch_name=${{ env.branch_name }}"
          echo "environment=${{ inputs.environment }}"
          echo "| Planning | Environment | Branch |" >> $GITHUB_STEP_SUMMARY
          echo "| ---------------- | ----------- | ------ |" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ inputs.environment }}" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "| :green_circle: Enabled | ${{ inputs.environment }} | ${{ env.branch_name }} |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ env.branch_name }}" == "development" ]]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "| :green_circle: Enabled | dev | ${{ env.branch_name }} |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ env.branch_name }}" == "staging" ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "| :green_circle: Enabled | staging | ${{ env.branch_name }} |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ env.branch_name }}" == "main" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "| :green_circle: Enabled | prod | ${{ env.branch_name }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "environment=" >> "$GITHUB_OUTPUT"
            echo "| :yellow_circle: Disabled | | ${{ env.branch_name }} |" >> $GITHUB_STEP_SUMMARY
          fi

  plan:
    name: Execute OpenTofu Plan
    if: ${{ !cancelled() && needs.should-plan.outputs.environment }}
    needs:
      - should-plan
    uses: ./.github/workflows/plan_call.yml
    with:
      environment: ${{ needs.should-plan.outputs.environment }}
    secrets: inherit

  plan-summary:
    name: OpenTofu Plan Results
    #if: ${{ !cancelled() }} # && contains(needs.plan.result, 'success') }}
    runs-on: ubuntu-latest
    needs:
      - plan
    steps:
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ needs.plan.outputs.result-artifact-id }}
          path: results
      - name: Generate Summary
        run: |
          ls -al results/
          ls -al results/*/
          jq --slurp . results/*/*.json

          echo "|   | Total Changes |" >> $GITHUB_STEP_SUMMARY
          echo "| - | ------------- |" >> $GITHUB_STEP_SUMMARY
          jq -n '{change_count: [inputs.change_count] | add}' results/*/*.json | jq -r '"|\(if .change_count == 0 then ":green_circle:" else ":yellow_circle:" end)|\(.change_count)|"'
          jq -n '{change_count: [inputs.change_count] | add}' results/*/*.json | jq -r '"|\(if .change_count == 0 then ":green_circle:" else ":yellow_circle:" end)|\(.change_count)|"' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<br/>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Action | Address |" >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ------- |" >> $GITHUB_STEP_SUMMARY
          jq -r '.resource_changes[] | "|\(.action)|\(.address)|"' results/*/*.json
          jq -r '.resource_changes[] | "|\(.action)|\(.address)|"' results/*/*.json >> $GITHUB_STEP_SUMMARY
